# Agent Router Configuration Example

# Server settings
server:
  host: "0.0.0.0"
  port: 8000
  workers: 4

# Global settings
settings:
  default_timeout: 30.0
  max_retries: 3
  retry_backoff_base: 1.0
  retry_backoff_max: 10.0
  cache_enabled: true
  cache_ttl: 300
  log_level: "INFO"

# Load balancing strategy: round_robin | least_cost | least_latency | weighted_random
balancer:
  strategy: "least_cost"

# Provider definitions
providers:
  - name: "openai"
    type: "openai"
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://api.openai.com/v1"
    priority: 1
    weight: 40
    rate_limit: 100
    timeout: 30.0
    models:
      - id: "gpt-4o"
        input_cost_per_1k: 0.0025
        output_cost_per_1k: 0.01
        max_tokens: 128000
      - id: "gpt-4o-mini"
        input_cost_per_1k: 0.00015
        output_cost_per_1k: 0.0006
        max_tokens: 128000

  - name: "anthropic"
    type: "anthropic"
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "https://api.anthropic.com"
    priority: 2
    weight: 30
    rate_limit: 50
    timeout: 30.0
    models:
      - id: "claude-sonnet-4-20250514"
        input_cost_per_1k: 0.003
        output_cost_per_1k: 0.015
        max_tokens: 200000
      - id: "claude-3-5-haiku-20241022"
        input_cost_per_1k: 0.001
        output_cost_per_1k: 0.005
        max_tokens: 200000

  - name: "openrouter"
    type: "openrouter"
    api_key: "${OPENROUTER_API_KEY}"
    base_url: "https://openrouter.ai/api/v1"
    priority: 3
    weight: 20
    rate_limit: 200
    timeout: 60.0
    models:
      - id: "meta-llama/llama-3.1-405b-instruct"
        input_cost_per_1k: 0.003
        output_cost_per_1k: 0.003
        max_tokens: 128000

  - name: "local-vllm"
    type: "openai_compatible"
    api_key: "not-needed"
    base_url: "http://localhost:8080/v1"
    priority: 4
    weight: 10
    rate_limit: 1000
    timeout: 60.0
    models:
      - id: "llama-3.1-8b"
        input_cost_per_1k: 0.0
        output_cost_per_1k: 0.0
        max_tokens: 32000
